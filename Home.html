<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartFlow Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0B0D11;
    --surface: #13151B;
    --surface2: #1C1F28;
    --border: #252933;
    --border2: #2F3444;
    --text: #E8EAF0;
    --text2: #7C8299;
    --text3: #4A5068;
    --accent: #00E5A0;
    --accent2: #00B87F;
    --danger: #FF4D6A;
    --danger2: #CC2040;
    --warn: #FFB830;
    --safe-bg: #081A12;
    --spam-bg: #160810;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
    --r: 12px;
    --r2: 8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 52px;
    gap: 16px;
  }
  .logo-block { display: flex; flex-direction: column; }
  .logo-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .logo-name {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .logo-name span { color: var(--accent); }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 6px 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    white-space: nowrap;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text3);
    transition: background 0.3s;
  }
  .status-dot.online { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .status-dot.error { background: var(--danger); }

  /* Type selector */
  .type-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .type-btn {
    flex: 1;
    padding: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.05em;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .type-btn:hover { border-color: var(--border2); color: var(--text); }
  .type-btn.active {
    background: var(--surface2);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Input area */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 4px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .input-card:focus-within { border-color: var(--border2); }

  textarea {
    width: 100%;
    min-height: 140px;
    background: transparent;
    border: none;
    outline: none;
    resize: vertical;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    padding: 14px 16px;
    caret-color: var(--accent);
  }
  textarea::placeholder { color: var(--text3); }

  .input-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-top: 1px solid var(--border);
  }
  .char-count { font-family: var(--mono); font-size: 11px; color: var(--text3); }

  .analyze-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--r2);
    padding: 10px 20px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .analyze-btn:hover { background: var(--accent2); transform: translateY(-1px); }
  .analyze-btn:active { transform: translateY(0); }
  .analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .analyze-btn svg { width: 14px; height: 14px; }

  /* Spinner */
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Result */
  .result-card {
    border-radius: var(--r);
    padding: 24px;
    margin-bottom: 12px;
    animation: slideIn 0.25s ease;
    border: 1px solid transparent;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .result-card.spam {
    background: var(--spam-bg);
    border-color: rgba(255,77,106,0.3);
  }
  .result-card.safe {
    background: var(--safe-bg);
    border-color: rgba(0,229,160,0.3);
  }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .verdict {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .verdict-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .verdict-icon.spam { background: rgba(255,77,106,0.15); }
  .verdict-icon.safe { background: rgba(0,229,160,0.15); }
  .verdict-label {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.1;
  }
  .verdict-label.spam { color: var(--danger); }
  .verdict-label.safe { color: var(--accent); }
  .verdict-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .confidence-block { text-align: right; }
  .confidence-pct {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 500;
    line-height: 1;
  }
  .confidence-pct.spam { color: var(--danger); }
  .confidence-pct.safe { color: var(--accent); }
  .confidence-label { font-size: 11px; color: var(--text2); font-family: var(--mono); margin-top: 2px; }

  /* Confidence bar */
  .bar-wrap {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }
  .bar-fill.spam { background: var(--danger); }
  .bar-fill.safe { background: var(--accent); }

  /* Tokens */
  .tokens-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }
  .tokens-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
  .token {
    font-family: var(--mono);
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid;
  }
  .token.hot { background: rgba(255,77,106,0.1); border-color: rgba(255,77,106,0.35); color: #FF8FA0; }
  .token.warm { background: rgba(255,184,48,0.08); border-color: rgba(255,184,48,0.3); color: var(--warn); }
  .token.cool { background: rgba(0,229,160,0.07); border-color: rgba(0,229,160,0.25); color: var(--accent); }

  .feedback-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .feedback-label { font-size: 12px; color: var(--text2); flex: 1; }
  .feedback-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 12px;
    border-radius: var(--r2);
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .feedback-btn:hover { border-color: var(--warn); color: var(--warn); }
  .feedback-btn.sent { border-color: var(--accent); color: var(--accent); cursor: default; }

  /* Stats */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: 14px;
  }
  .stat-label { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  .stat-val { font-size: 22px; font-weight: 700; line-height: 1; }
  .stat-val.green { color: var(--accent); }
  .stat-val.red { color: var(--danger); }

  /* History */
  .history-section { margin-top: 32px; }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-title { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); }
  .clear-btn { font-family: var(--mono); font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; }
  .clear-btn:hover { color: var(--danger); }

  .history-list { display: flex; flex-direction: column; gap: 6px; }
  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .history-item:hover { border-color: var(--border2); }
  .h-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .h-badge.spam { background: rgba(255,77,106,0.15); color: var(--danger); }
  .h-badge.safe { background: rgba(0,229,160,0.12); color: var(--accent); }
  .h-text { color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .h-conf { color: var(--text3); flex-shrink: 0; }

  /* Error card */
  .error-card {
    background: rgba(255,77,106,0.06);
    border: 1px solid rgba(255,77,106,0.25);
    border-radius: var(--r);
    padding: 16px 20px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--danger);
    margin-bottom: 12px;
    animation: slideIn 0.2s ease;
  }
  .error-hint { color: var(--text2); font-size: 11px; margin-top: 6px; }

  /* Examples */
  .examples-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .example-chip {
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    color: var(--text3);
    cursor: pointer;
    background: var(--surface);
    transition: all 0.15s;
  }
  .example-chip:hover { color: var(--text2); border-color: var(--text2); }

  @media (max-width: 600px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    header { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-block">
      <div class="logo-tag">v0.1 — SMS / Email Detection</div>
      <div class="logo-name">Smart<span>Flow</span></div>
    </div>
    <div class="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">connecting...</span>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Analyzed</div>
      <div class="stat-val" id="stat-analyzed">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Flagged</div>
      <div class="stat-val red" id="stat-flagged">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Corrections</div>
      <div class="stat-val" id="stat-corrections">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Model acc.</div>
      <div class="stat-val green">98.2%</div>
    </div>
  </div>

  <!-- Type selector -->
  <div class="type-row">
    <button class="type-btn active" data-type="sms" onclick="selectType(this)">SMS</button>
    <button class="type-btn" data-type="email" onclick="selectType(this)">Email</button>
  </div>

  <!-- Input -->
  <div class="input-card">
    <textarea id="msg-input" placeholder="Paste or type a message to analyze..." oninput="updateChar()"></textarea>
    <div class="input-footer">
      <span class="char-count"><span id="char-count">0</span> chars</span>
      <button class="analyze-btn" id="analyze-btn" onclick="analyze()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="7" cy="7" r="5"/><path d="M11 11l3 3"/>
        </svg>
        Analyze
      </button>
    </div>
  </div>

  <!-- Examples -->
  <div class="examples-row">
    <span class="example-chip" onclick="fillExample('spam1')">🎣 Phishing SMS</span>
    <span class="example-chip" onclick="fillExample('spam2')">🏦 Fake bank alert</span>
    <span class="example-chip" onclick="fillExample('spam3')">📦 Fake delivery</span>
    <span class="example-chip" onclick="fillExample('ham1')">✅ Legit message</span>
    <span class="example-chip" onclick="fillExample('ham2')">✅ Legit bank</span>
  </div>

  <!-- Result -->
  <div id="result-area"></div>

  <!-- History -->
  <div class="history-section" id="history-section" style="display:none">
    <div class="section-header">
      <div class="section-title">Recent Analyses</div>
      <button class="clear-btn" onclick="clearHistory()">Clear</button>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>

</div>

<script>
const API = 'http://localhost:8000';
let currentType = 'sms';
let stats = { analyzed: 0, flagged: 0, corrections: 0 };
let history = [];

// Maps frontend type buttons to the modalities accepted by DetectRequest
const modalityMap = { sms: 'text', email: 'email', audio: 'audio', video: 'video' };

const examples = {
  spam1: 'URGENT: Your account has been compromised! Click here immediately to verify your identity and claim your FREE reward: http://scam-link.xyz/verify?id=83992',
  spam2: 'BANK ALERT: Suspicious activity detected on your account. Your card has been temporarily locked. Call 1-800-FAKE-NUM or click http://totallynotscam.com/unlock NOW to restore access.',
  spam3: 'Your package could not be delivered. A $2.99 redelivery fee is required. Pay now to avoid return: http://fake-fedex.net/redeliver?track=839201',
  ham1: "Hey! Are we still on for dinner tonight? Let me know if 7pm works for you.",
  ham2: "Your Chase account statement for July is now available. Sign in at chase.com to view your balance and recent transactions."
};

// FIX 1: correct health endpoint — was /health, must be /api/v1/health
async function checkHealth() {
  try {
    const r = await fetch(`${API}/api/v1/health`, { signal: AbortSignal.timeout(3000) });
    if (r.ok) setStatus('online', 'API online');
    else setStatus('error', 'API error');
  } catch {
    setStatus('error', 'API offline — demo mode');
  }
}

function setStatus(state, text) {
  document.getElementById('status-dot').className = 'status-dot ' + state;
  document.getElementById('status-text').textContent = text;
}

function selectType(btn) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentType = btn.dataset.type;
}

function updateChar() {
  const len = document.getElementById('msg-input').value.length;
  document.getElementById('char-count').textContent = len;
}

function fillExample(key) {
  const ta = document.getElementById('msg-input');
  ta.value = examples[key];
  updateChar();
  ta.focus();
}

async function analyze() {
  const text = document.getElementById('msg-input').value.trim();
  if (!text) return;

  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Analyzing...';

  document.getElementById('result-area').innerHTML = '';

  try {
    let data;
    try {
      // FIX 2: correct endpoint (/api/v1/detect) and correct request fields
      // (content + modality instead of text + message_type)
      const res = await fetch(`${API}/api/v1/detect`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          content: text,
          modality: modalityMap[currentType] || 'text'
        }),
        signal: AbortSignal.timeout(8000)
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      data = await res.json();
    } catch (fetchErr) {
      // Demo mode: simulate a result
      data = simulateResult(text);
    }

    renderResult(data, text);
    addToHistory(data, text);
    updateStats(data.is_scam);
  } catch (err) {
    renderError(err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3"/></svg> Analyze`;
  }
}

function simulateResult(text) {
  // Offline demo fallback — keyword-based heuristic
  const spamWords = ['free','urgent','click','verify','prize','won','account','locked','password','pay','fee','claim','limited','offer','congratulations','winner','call now','act now','http://','selected'];
  const lower = text.toLowerCase();
  const hits = spamWords.filter(w => lower.includes(w));
  const is_scam = hits.length >= 2 || lower.includes('http://');
  const confidence = is_scam
    ? Math.min(0.99, 0.72 + hits.length * 0.05)
    : Math.max(0.60, 0.95 - hits.length * 0.08);
  // Simulate as plain strings to match the real API's explanation field
  const explanation = is_scam ? hits.slice(0, 5) : [];
  return { is_scam, confidence, explanation };
}

function renderResult(data, text) {
  const cls = data.is_scam ? 'spam' : 'safe';
  const icon = data.is_scam ? '⚠️' : '✓';
  const label = data.is_scam ? 'Likely Spam / Scam' : 'Looks Legitimate';
  const sub = data.is_scam ? 'This message shows characteristics of a scam attempt.' : 'No significant scam indicators detected.';
  const pct = Math.round(data.confidence * 100);

  // FIX 3: response uses `explanation` (plain string array), not `top_tokens` (objects with .weight)
  let tokensHtml = '';
  if (data.explanation && data.explanation.length) {
    tokensHtml = `
      <div class="tokens-label">Suspicious signals</div>
      <div class="tokens-wrap">${data.explanation.map((t, i) => {
        const tier = i === 0 ? 'hot' : i < 3 ? 'warm' : 'cool';
        return `<span class="token ${tier}">${t}</span>`;
      }).join('')}</div>`;
  }

  document.getElementById('result-area').innerHTML = `
    <div class="result-card ${cls}" id="current-result">
      <div class="result-header">
        <div class="verdict">
          <div class="verdict-icon ${cls}">${icon}</div>
          <div>
            <div class="verdict-label ${cls}">${label}</div>
            <div class="verdict-sub">${sub}</div>
          </div>
        </div>
        <div class="confidence-block">
          <div class="confidence-pct ${cls}">${pct}%</div>
          <div class="confidence-label">confidence</div>
        </div>
      </div>
      <div class="bar-wrap"><div class="bar-fill ${cls}" id="conf-bar" style="width:0%"></div></div>
      ${tokensHtml}
      <div class="feedback-row">
        <div class="feedback-label">Result incorrect?</div>
        <button class="feedback-btn" id="fb-btn" onclick="sendFeedback('${encodeURIComponent(text)}', ${data.is_scam})">Mark as wrong</button>
      </div>
    </div>`;

  setTimeout(() => {
    const bar = document.getElementById('conf-bar');
    if (bar) bar.style.width = pct + '%';
  }, 50);
}

async function sendFeedback(encodedText, wasScam) {
  const btn = document.getElementById('fb-btn');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  const text = decodeURIComponent(encodedText);
  try {
    await fetch(`${API}/feedback`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, predicted_is_scam: wasScam, correct_is_scam: !wasScam }),
      signal: AbortSignal.timeout(5000)
    });
  } catch { /* offline — still update UI */ }

  btn.textContent = '✓ Reported';
  btn.classList.add('sent');
  stats.corrections++;
  document.getElementById('stat-corrections').textContent = stats.corrections;
}

function renderError(msg) {
  document.getElementById('result-area').innerHTML = `
    <div class="error-card">
      Could not reach the backend API.
      <div class="error-hint">Start the server: <code>python algoml.py serve</code> — using demo mode for now.</div>
    </div>`;
}

function addToHistory(data, text) {
  history.unshift({ data, text, ts: Date.now() });
  if (history.length > 20) history.pop();
  renderHistory();
}

function renderHistory() {
  const sec = document.getElementById('history-section');
  const list = document.getElementById('history-list');
  if (!history.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  list.innerHTML = history.map((h, i) => {
    const cls = h.data.is_scam ? 'spam' : 'safe';
    const label = h.data.is_scam ? 'SPAM' : 'SAFE';
    const pct = Math.round(h.data.confidence * 100);
    const preview = h.text.slice(0, 60) + (h.text.length > 60 ? '…' : '');
    return `<div class="history-item" onclick="reloadResult(${i})">
      <span class="h-badge ${cls}">${label}</span>
      <span class="h-text">${preview}</span>
      <span class="h-conf">${pct}%</span>
    </div>`;
  }).join('');
}

function reloadResult(i) {
  const h = history[i];
  document.getElementById('msg-input').value = h.text;
  updateChar();
  renderResult(h.data, h.text);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearHistory() {
  history = [];
  renderHistory();
}

function updateStats(isScam) {
  stats.analyzed++;
  if (isScam) stats.flagged++;
  document.getElementById('stat-analyzed').textContent = stats.analyzed;
  document.getElementById('stat-flagged').textContent = stats.flagged;
}

// Init
checkHealth();
</script>
</body>
</html>
